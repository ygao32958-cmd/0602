<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>口腔防衛戰：蛀牙惡魔來襲！</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
  <style>
    body {
      margin: 0;
      padding: 0;
      overflow: hidden;
      background-color: #4A1525; /* 深口腔紅 */
    }
    #ui-container {
      position: absolute;
      top: 20px;
      left: 20px;
      color: #ffffff;
      font-family: 'Microsoft JhengHei', sans-serif;
      background: rgba(30, 10, 15, 0.85);
      padding: 20px;
      border-radius: 15px;
      border: 2px solid #ff4d6d;
      backdrop-filter: blur(10px);
      pointer-events: none;
      box-shadow: 0 6px 25px rgba(0,0,0,0.6);
      width: 300px;
    }
    h1 {
      font-size: 20px;
      margin: 0 0 8px 0;
      color: #ff4d6d;
      letter-spacing: 1px;
      text-shadow: 0 0 10px rgba(255, 77, 109, 0.5);
    }
    p {
      font-size: 13px;
      margin: 6px 0;
      color: #ffb3c1;
      line-height: 1.5;
    }
    .stat-box {
      margin-top: 15px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .stat-item {
      background: rgba(0, 0, 0, 0.5);
      padding: 10px 15px;
      border-radius: 12px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border: 1px solid rgba(255, 255, 255, 0.1);
      box-shadow: inset 0 0 15px rgba(0,0,0,0.5);
    }
    .stat-label {
      font-size: 12px;
      color: #ffb3c1;
      font-weight: bold;
    }
    .stat-value {
      font-size: 32px;
      font-weight: 900;
      font-family: 'Arial Black', sans-serif;
    }
    #game-timer { color: #4df3ff; text-shadow: 0 0 15px rgba(77, 243, 255, 0.8); }
    #health-val { color: #ff4d6d; text-shadow: 0 0 15px rgba(255, 77, 109, 0.8); }
    .stat-small {
      font-size: 13px;
      color: #ffffff;
      opacity: 0.9;
      margin-top: 5px;
      padding-left: 5px;
    }
    #weapon-container {
      position: absolute;
      right: 20px;
      top: 50%;
      transform: translateY(-50%);
      display: flex;
      flex-direction: column;
      gap: 15px;
      z-index: 10;
    }
    .weapon-btn {
      width: 70px;
      height: 70px;
      background: rgba(30, 10, 15, 0.85);
      border: 2px solid #ff4d6d;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 30px;
      cursor: pointer;
      transition: all 0.2s;
      box-shadow: 0 4px 10px rgba(0,0,0,0.3);
      pointer-events: auto;
    }
    .weapon-btn:hover { background: rgba(255, 77, 109, 0.2); }
    .weapon-btn.active {
      background: #ff4d6d;
      box-shadow: 0 0 15px #ff4d6d;
      transform: scale(1.1);
    }
    #game-overlay, #start-overlay {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      text-align: center;
      display: none;
      background: rgba(0,0,0,0.85);
      padding: 40px;
      border-radius: 20px;
      border: 3px solid #ff4d6d;
      color: white;
      z-index: 100;
    }
    button {
      margin-top: 20px;
      padding: 10px 25px;
      font-size: 18px;
      cursor: pointer;
      background: #ff4d6d;
      color: white;
      border: none;
      border-radius: 5px;
    }
  </style>
</head>
<body>

  <div id="ui-container">
    <h1>😈 口腔防衛戰</h1>
    <p>🦷 畫面中央是一顆健康的牙齒。</p>
    <p>🏃‍♂️ 【滑鼠靠近】惡魔時，可以把它們嚇跑。</p>
    
    <div class="stat-box">
      <div class="stat-item" style="border-left: 6px solid #4df3ff;">
        <div class="stat-label">⏳ 剩餘時間</div>
        <div class="stat-value"><span id="game-timer">60</span><span style="font-size:14px; font-weight:normal; margin-left:4px;">s</span></div>
      </div>
      <div class="stat-item" style="border-left: 6px solid #ff4d6d;">
        <div class="stat-label">❤️ 牙齒生命</div>
        <div class="stat-value"><span id="health-val">100</span><span style="font-size:14px; font-weight:normal; margin-left:4px;">%</span></div>
      </div>
      <div class="stat-small">
        👾 總數: <span id="monster-count" style="color:#fff3b0; font-weight:bold;">0</span> 
        <span style="margin: 0 10px; opacity:0.3;">|</span>
        ⚔️ <span id="current-weapon-txt" style="color:#4df3ff; font-weight:bold;">指尖</span>
      </div>
    </div>
  </div>

  <div id="weapon-container">
    <div id="btn-finger" class="weapon-btn active" onclick="selectWeapon('finger')">☝️</div>
    <div id="btn-brush" class="weapon-btn" onclick="selectWeapon('brush')">🪥</div>
    <div id="btn-paste" class="weapon-btn" onclick="selectWeapon('paste')">🧪</div>
  </div>

  <div id="start-overlay" style="display: flex; flex-direction: column; align-items: center;">
    <h1 style="font-size: 42px; margin-bottom: 20px; color: #ff4d6d; text-shadow: 0 0 20px rgba(255,77,109,0.5);">🦷 牙齒保衛戰</h1>
    <div style="text-align: left; background: rgba(255,255,255,0.1); padding: 25px; border-radius: 15px; margin-bottom: 25px; max-width: 500px; line-height: 1.6;">
      <h3 style="margin-top: 0; color: #4df3ff; border-bottom: 1px solid rgba(77,243,255,0.3); padding-bottom: 8px;">📜 任務指南</h3>
      <p style="margin: 10px 0;">🛡️ <b>生存目標：</b> 守護大牙齒 <span style="color: #4df3ff; font-weight: bold;">60 秒</span>，血量歸零則失敗。</p>
      <p style="margin: 10px 0;">🖱️ <b>滑鼠攻擊：</b> 點擊惡魔可造成傷害並<span style="color: #ff4d6d; font-weight: bold;">強力擊退</span>它們。</p>
      <p style="margin: 10px 0;">✨ <b>緊急修復：</b> 捕捉<span style="color: gold; font-weight: bold;">金色惡魔</span>（靠近它）可恢復牙齒生命。</p>

      <h3 style="margin-top: 20px; color: #4df3ff; border-bottom: 1px solid rgba(77,243,255,0.3); padding-bottom: 8px;">⚔️ 武器庫說明 (畫面右側切換)</h3>
      <div style="display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-top: 15px;">
        <div style="text-align: center; background: rgba(0,0,0,0.4); padding: 12px 5px; border-radius: 10px; border: 1px solid rgba(255,255,255,0.1);">
          <div style="font-size: 28px; margin-bottom: 5px;">☝️</div>
          <b style="font-size: 15px;">指尖</b><br><span style="font-size: 11px; opacity: 0.8;">平衡型攻擊<br>基礎射程</span>
        </div>
        <div style="text-align: center; background: rgba(0,0,0,0.4); padding: 12px 5px; border-radius: 10px; border: 1px solid rgba(255,255,255,0.1);">
          <div style="font-size: 28px; margin-bottom: 5px;">🪥</div>
          <b style="font-size: 15px;">牙刷</b><br><span style="font-size: 11px; color: #ff4d6d;">極致單體傷害<br>範圍較小</span>
        </div>
        <div style="text-align: center; background: rgba(0,0,0,0.4); padding: 12px 5px; border-radius: 10px; border: 1px solid rgba(255,255,255,0.1);">
          <div style="font-size: 28px; margin-bottom: 5px;">🧪</div>
          <b style="font-size: 15px;">牙膏</b><br><span style="font-size: 11px; color: #4df3ff;">超廣範圍擊退<br>威力較低</span>
        </div>
      </div>
    </div>
    <button onclick="startGame()" style="font-weight: bold; padding: 15px 60px; border-radius: 30px; font-size: 20px; box-shadow: 0 10px 20px rgba(255,77,109,0.3); border: none;">進入戰場</button>
  </div>

  <div id="game-overlay">
    <h1 id="result-title">遊戲結束</h1>
    <p id="result-desc"></p>
    <button onclick="location.reload()">重新挑戰</button>
  </div>

  <script src="sketch.js"></script>
</body>
</html>
